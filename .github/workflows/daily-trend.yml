name: Daily Trend Collection

on:
  schedule:
    # 毎日 JST 8:00 (UTC 23:00)
    - cron: '0 23 * * *'
  workflow_dispatch: # 手動実行も可能

jobs:
  collect-trends:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Collect trends
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          node scripts/collect-trends.js
      
      - name: Commit and push
        run: |
          git config --global user.name 'Trend Bot'
          git config --global user.email 'bot@trendvault.local'
          git add daily/
          if git diff --staged --quiet; then
            echo "変更なし"
          else
            git commit -m "📊 Daily trend: $(date -u +%Y-%m-%d)"
            git push
          fi
